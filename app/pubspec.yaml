name: hermes
description: Personal AI Agent Platform — beautiful, powerful, yours.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & WebSocket
  dio: ^5.4.3
  socket_io_client: ^2.0.3+1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # UI
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.3
  cached_network_image: ^3.3.1

  # Camera (QR scanning)
  mobile_scanner: ^5.2.3

  # Notifications
  flutter_local_notifications: ^17.2.2

  # In-app purchases
  purchases_flutter: ^7.8.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  uuid: ^4.4.2
  cron: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/
